name: Publish to GH Pages
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout destination
        uses: actions/checkout@v4
        if: github.ref == 'refs/heads/main'
        with:
          ref: gh-pages
          path: built-site

      - name: Setup Hugo
        run: |
          curl -L -o /tmp/hugo.tar.gz 'https://github.com/gohugoio/hugo/releases/download/v0.150.1/hugo_0.150.1_linux-amd64.tar.gz'
          tar -C ${RUNNER_TEMP} -zxvf /tmp/hugo.tar.gz hugo          

      - name: Build
        run: ${RUNNER_TEMP}/hugo --minify --cleanDestinationDir

      - name: Create .nojekyll file
        run: touch public/.nojekyll

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -a --delete public/ ${GITHUB_WORKSPACE}/built-site/
          cd ${GITHUB_WORKSPACE}/built-site
          git config user.name 'rohnson1999'
          git config user.email 'hrs.199921@gmail.com'
          git add .
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m 'Updated site'
            git push
          fi
